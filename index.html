<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #1a1a1a, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    text-align: center;
}

h1 {
    font-size: 2.5rem;
}

.buttons {
    margin-top: 20px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 1rem;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
}

#yes {
    background: #ff4d6d;
    color: white;
}

#no {
    background: #444;
    color: white;
}

.message {
    margin-top: 20px;
    font-size: 1.4rem;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.show {
    opacity: 1;
}

.heart, .flower {
    position: absolute;
    bottom: -20px;
    animation: float 5s linear infinite;
}

.heart {
    position: absolute;
    bottom: -20px;
    color: #ff4d6d;
    font-size: 28px; /* bigger */
    text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d; /* glow */
    opacity: 1;
    animation: float 5s linear infinite;
}
.flower { color: #ff85a2; }

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>
<body>

<div class="container">
    <h1>Do you love me? 💖</h1>
    <div class="buttons">
        <button id="yes" onclick="yesClick()">Yes</button>
        <button id="no" onclick="noClick()">No</button>
    </div>
    <div id="message" class="message"></div>
</div>

<script>
let yesCount = 0;
let noCount = 0;
let started = false;

function yesClick() {
    const msg = document.getElementById('message');
    yesCount++;

    if (yesCount === 1) {
        msg.innerText = "Are you sure?";
    } else if (yesCount === 2) {
        msg.innerText = "Think again 😏";
    } else {
        msg.innerText = "I know 😌 I love you too ❤️";
        if (!started) {
            startEffects();
            started = true;
        }
    }

    msg.classList.add('show');
}

function noClick() {
    const yesBtn = document.getElementById('yes');
    const noBtn = document.getElementById('no');

    noCount++;

    yesBtn.style.transform = `scale(${1 + noCount * 0.3})`;
    noBtn.style.transform = `scale(${1 - noCount * 0.2})`;

    if (noCount >= 4) {
        noBtn.style.display = 'none';
    }
}

function startEffects() {
    const btn = document.getElementById('yes');
    const rect = btn.getBoundingClientRect();

    // hearts from button 💗 (move to center and fade)
    setInterval(() => {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '💗';

        const startX = rect.left + rect.width / 2;
        const startY = window.innerHeight - 60;
        const endY = window.innerHeight / 2;

        heart.style.left = startX + 'px';
        heart.style.bottom = '0px';
        heart.style.position = 'absolute';
        heart.style.transition = 'transform 1.5s ease-out, opacity 1.5s ease-out';

        document.body.appendChild(heart);

        // trigger movement
        setTimeout(() => {
            heart.style.transform = `translateY(-${startY - endY}px)`;
            heart.style.opacity = '0';
        }, 50);

        setTimeout(() => heart.remove(), 1600);
    }, 300);

    // floating hearts from bottom ❤️
    setInterval(() => {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 20 + 10 + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }, 400);

    // flowers 🌸
    setInterval(() => {
        const flower = document.createElement('div');
        flower.classList.add('flower');
        flower.innerHTML = '🌸';
        flower.style.left = Math.random() * 100 + 'vw';
        flower.style.fontSize = Math.random() * 20 + 12 + 'px';
        document.body.appendChild(flower);
        setTimeout(() => flower.remove(), 5000);
    }, 600);
}
</script>

</body>
</html>
